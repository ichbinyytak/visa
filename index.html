<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美国移民排期查询 - Visa Bulletin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      text-align: center;
      padding: 40px 0;
    }
    
    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    
    header p {
      color: #8892b0;
      font-size: 1.1rem;
    }
    
    .controls {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .control-group label {
      font-size: 0.9rem;
      color: #8892b0;
    }
    
    select {
      padding: 12px 20px;
      font-size: 1rem;
      border: 2px solid #3d5a80;
      border-radius: 8px;
      background: #0f3460;
      color: #fff;
      cursor: pointer;
      min-width: 200px;
      transition: all 0.3s ease;
    }
    
    select:hover {
      border-color: #00d4ff;
    }
    
    select:focus {
      outline: none;
      border-color: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
      color: #8892b0;
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #00d4ff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid #ff5252;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #ff5252;
      margin-bottom: 30px;
    }
    
    .data-source {
      text-align: center;
      margin-bottom: 20px;
      color: #8892b0;
      font-size: 0.9rem;
    }
    
    .data-source a {
      color: #00d4ff;
      text-decoration: none;
    }
    
    .data-source a:hover {
      text-decoration: underline;
    }
    
    .tables-container {
      display: grid;
      gap: 30px;
    }
    
    .table-section {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 25px;
      backdrop-filter: blur(10px);
    }
    
    .table-section h2 {
      color: #00d4ff;
      margin-bottom: 20px;
      font-size: 1.4rem;
      border-bottom: 2px solid #3d5a80;
      padding-bottom: 10px;
    }
    
    .table-wrapper {
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }
    
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    th {
      background: #0f3460;
      color: #00d4ff;
      font-weight: 600;
      white-space: nowrap;
    }
    
    th:first-child {
      border-radius: 8px 0 0 0;
    }
    
    th:last-child {
      border-radius: 0 8px 0 0;
    }
    
    tr:hover {
      background: rgba(0, 212, 255, 0.05);
    }
    
    td {
      color: #e0e0e0;
    }
    
    .current-date {
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      padding: 8px 16px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 15px;
      font-weight: 500;
    }
    
    .no-data {
      text-align: center;
      padding: 40px;
      color: #8892b0;
    }
    
    footer {
      text-align: center;
      padding: 40px 0;
      color: #8892b0;
      font-size: 0.9rem;
    }
    
    footer a {
      color: #00d4ff;
      text-decoration: none;
    }
    
    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8rem;
      }
      
      .controls {
        flex-direction: column;
        align-items: center;
      }
      
      select {
        width: 100%;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>美国移民排期查询</h1>
      <p>U.S. Visa Bulletin - Immigration Visa Processing</p>
    </header>
    
    <div class="controls">
      <div class="control-group">
        <label for="yearSelect">选择年份</label>
        <select id="yearSelect"></select>
      </div>
      <div class="control-group">
        <label for="monthSelect">选择月份</label>
        <select id="monthSelect"></select>
      </div>
      <div class="control-group">
        <label for="categorySelect">移民类别</label>
        <select id="categorySelect">
          <option value="family">亲属移民 (Family-Based)</option>
          <option value="employment">职业移民 (Employment-Based)</option>
        </select>
      </div>
    </div>
    
    <div class="data-source">
      数据来源: <a href="https://travel.state.gov/content/travel/en/legal/visa-law0/visa-bulletin.html" target="_blank" rel="noopener">U.S. Department of State - Visa Bulletin</a>
    </div>
    
    <div id="content">
      <div class="loading">正在加载数据...</div>
    </div>
    
    <footer>
      <p>本工具仅供信息参考，请以美国国务院官方发布为准</p>
    </footer>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
