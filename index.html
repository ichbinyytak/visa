<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美国移民排期查询 - Visa Bulletin</title>
  <style>
    :root {
      --bg-top: #f6efe3;
      --bg-bottom: #eef3f8;
      --panel: rgba(255, 255, 255, 0.78);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(40, 66, 92, 0.12);
      --text: #17324a;
      --muted: #64748b;
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --accent-2: #c2410c;
      --shadow: 0 18px 50px rgba(23, 50, 74, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(194, 65, 12, 0.12), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      min-height: 100vh;
      color: var(--text);
    }
    
    .container {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    
    header {
      text-align: center;
      padding: 36px 24px 28px;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }
    
    header h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 12px;
    }
    
    header p {
      color: var(--muted);
      font-size: 1.02rem;
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.7;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 700;
    }
    
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin: 26px 0 22px;
      padding: 24px;
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .control-group label {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 600;
    }
    
    select {
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      min-width: 0;
      transition: all 0.3s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    
    select:hover {
      border-color: rgba(15, 118, 110, 0.35);
    }
    
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }
    
    .loading {
      text-align: center;
      padding: 72px 24px;
      font-size: 1.2rem;
      color: var(--muted);
      background: var(--panel);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: var(--shadow);
    }
    
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .error {
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.2);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      color: #b91c1c;
      margin-bottom: 30px;
      box-shadow: var(--shadow);
    }
    
    .data-source {
      text-align: center;
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    .data-source a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
    
    .data-source a:hover {
      text-decoration: underline;
    }

    .results-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
      padding: 0 4px;
    }

    .results-summary h2 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: var(--text);
    }

    .results-summary p {
      color: var(--muted);
      line-height: 1.6;
    }
    
    .tables-container {
      display: grid;
      gap: 22px;
    }
    
    .table-section {
      background: var(--panel);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
    }
    
    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .section-heading h3 {
      font-size: 1.1rem;
      color: var(--text);
    }

    .section-heading span {
      font-size: 0.85rem;
      color: var(--accent-2);
      background: rgba(194, 65, 12, 0.1);
      padding: 6px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }
    
    .table-wrapper {
      overflow-x: auto;
      border-radius: 18px;
      border: 1px solid rgba(15, 23, 42, 0.06);
      background: rgba(255, 255, 255, 0.72);
    }
    
    .bulletin-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 720px;
    }
    
    th, td {
      padding: 14px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      vertical-align: top;
    }
    
    th {
      position: sticky;
      top: 0;
      background: #f7fafc;
      color: var(--text);
      font-weight: 600;
      white-space: normal;
      line-height: 1.5;
      z-index: 1;
    }
    
    th:first-child {
      border-radius: 16px 0 0 0;
    }
    
    th:last-child {
      border-radius: 0 16px 0 0;
    }
    
    tr:hover {
      background: rgba(15, 118, 110, 0.04);
    }
    
    td {
      color: var(--text);
      line-height: 1.55;
      word-break: break-word;
    }
    
    .current-date {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 10px 14px;
      border-radius: 999px;
      display: inline-block;
      font-weight: 700;
      white-space: nowrap;
    }
    
    .no-data {
      text-align: center;
      padding: 52px 24px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }
    
    footer {
      text-align: center;
      padding: 36px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    
    @media (max-width: 768px) {
      .container {
        padding: 20px 14px 40px;
      }

      header {
        padding: 26px 18px 22px;
        border-radius: 22px;
      }

      header h1 {
        font-size: 1.8rem;
      }

      .controls {
        grid-template-columns: 1fr;
        padding: 18px;
        gap: 16px;
      }
      
      .results-head {
        flex-direction: column;
        align-items: flex-start;
      }
      
      select {
        width: 100%;
      }

      .table-section {
        padding: 18px;
      }

      .section-heading {
        flex-direction: column;
        align-items: flex-start;
      }

      .table-wrapper {
        overflow: visible;
        border: none;
        background: transparent;
      }

      .bulletin-table {
        min-width: 0;
      }

      .bulletin-table thead {
        display: none;
      }

      .bulletin-table tbody {
        display: grid;
        gap: 14px;
      }

      .bulletin-table tr {
        display: block;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(15, 23, 42, 0.06);
      }

      .bulletin-table td {
        display: grid;
        grid-template-columns: minmax(88px, 108px) 1fr;
        gap: 12px;
        padding: 10px 0;
      }

      .bulletin-table td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
      }

      .bulletin-table td:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="hero-kicker">Visa Bulletin Tracker</div>
      <h1>美国移民排期查询</h1>
      <p>按月份查看亲属移民和职业移民排期，页面会直接调用接口抓取美国国务院最新公告内容。</p>
    </header>
    
    <div class="controls">
      <div class="control-group">
        <label for="yearSelect">选择年份</label>
        <select id="yearSelect"></select>
      </div>
      <div class="control-group">
        <label for="monthSelect">选择月份</label>
        <select id="monthSelect"></select>
      </div>
      <div class="control-group">
        <label for="categorySelect">移民类别</label>
        <select id="categorySelect">
          <option value="family">亲属移民 (Family-Based)</option>
          <option value="employment">职业移民 (Employment-Based)</option>
        </select>
      </div>
    </div>
    
    <div class="data-source">
      数据来源: <a href="https://travel.state.gov/content/travel/en/legal/visa-law0/visa-bulletin.html" target="_blank" rel="noopener">U.S. Department of State - Visa Bulletin</a>
    </div>
    
    <div id="content">
      <div class="loading">正在加载数据...</div>
    </div>
    
    <footer>
      <p>本工具仅供信息参考，请以美国国务院官方发布为准</p>
    </footer>
  </div>
  
  <script type="module" src="/src/main.js"></script>
</body>
</html>
